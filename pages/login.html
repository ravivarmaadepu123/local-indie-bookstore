<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inksire Books - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">

<!-- Icons -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="12" fill="%23f2e9d8"/%3E%3Cpath d="M16 14h18c6 0 10 4 10 10v28c0 2-2 4-4 4H22c-3 0-6 2-6 4V14z" fill="%23925a2c"/%3E%3Cpath d="M16 14h18c6 0 10 4 10 10v28c0 2-2 4-4 4H22c-3 0-6 2-6 4" fill="none" stroke="%23fff" stroke-width="2"/%3E%3C/svg%3E">
</head>

<body>

<section class="login-page">

<div class="login-container">

<!-- LEFT -->
<div class="login-left">
  <h1>A World of Stories Awaits</h1>
  <p>
    Step into a curated universe of books, ideas, and imagination.
    Manage your bookstore with elegance and precision.
  </p>
</div>

<!-- RIGHT -->
<div class="login-box">

<div class="auth-brand">
  <a href="index.html" class="auth-logo" aria-label="Inksire Books home">
    <i class="fa-solid fa-book-open"></i>
    <span>Inksire Books</span>
  </a>
</div>

<h2>Welcome Back</h2>

<form>

<!-- EMAIL -->
<div class="input-group">
  <i class="fa-solid fa-envelope"></i>
  <input type="email" required>
  <label>Email Address</label>
</div>

<!-- PASSWORD -->
<div class="input-group">
  <i class="fa-solid fa-lock"></i>
  <input type="password" id="password" required>
  <label>Password</label>
  <span class="toggle-pass" onclick="togglePass()" aria-label="Toggle password visibility">
    <i class="fa-solid fa-eye" aria-hidden="true"></i>
  </span>
</div>

<!-- OPTIONS -->
<div class="options">
  <label><input type="checkbox"> Remember Me</label>
  <a href="#">Forgot?</a>
</div>

<!-- BUTTON -->
<button class="login-btn">Sign In</button>

<!-- DIVIDER -->
<div class="divider">or continue with</div>

<!-- SOCIAL -->
<div class="social-login">
  <button class="social-btn"><i class="fa-brands fa-google"></i><span>Google</span></button>
  <button class="social-btn"><i class="fa-brands fa-apple"></i><span>Apple</span></button>
  <button class="social-btn"><i class="fa-brands fa-facebook-f"></i><span>Facebook</span></button>
  <button class="social-btn"><i class="fa-brands fa-github"></i><span>GitHub</span></button>
</div>

<!-- SIGNUP -->
<p class="signup-text">
  Don’t have an account? <a href="register.html">Sign Up</a>
</p>

</form>

</div>

</div>

</section>

<script>
function togglePass(){
const input = document.getElementById("password");
const icon = document.querySelector(".toggle-pass i");
const isHidden = input.type === "password";
input.type = isHidden ? "text" : "password";
icon.classList.toggle("fa-eye", !isHidden);
icon.classList.toggle("fa-eye-slash", isHidden);
}
</script>

</body>
</html>
