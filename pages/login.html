<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inksire Books - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">

<!-- Icons -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<section class="login-page">

<div class="login-container">

<!-- LEFT -->
<div class="login-left">
  <h1>A World of Stories Awaits</h1>
  <p>
    Step into a curated universe of books, ideas, and imagination.
    Manage your bookstore with elegance and precision.
  </p>
</div>

<!-- RIGHT -->
<div class="login-box">

<h2>Welcome Back</h2>

<form>

<!-- EMAIL -->
<div class="input-group">
  <i class="fa-solid fa-envelope"></i>
  <input type="email" required>
  <label>Email Address</label>
</div>

<!-- PASSWORD -->
<div class="input-group">
  <i class="fa-solid fa-lock"></i>
  <input type="password" id="password" required>
  <label>Password</label>
  <span class="toggle-pass" onclick="togglePass()">
    <i class="fa-solid fa-eye"></i>
  </span>
</div>

<!-- OPTIONS -->
<div class="options">
  <label><input type="checkbox"> Remember Me</label>
  <a href="#">Forgot?</a>
</div>

<!-- BUTTON -->
<button class="login-btn">Sign In</button>

<!-- DIVIDER -->
<div class="divider">or continue with</div>

<!-- SOCIAL -->
<div class="social-login">
  <button><i class="fa-brands fa-google"></i></button>
  <button><i class="fa-brands fa-facebook-f"></i></button>
</div>

<!-- SIGNUP -->
<p class="signup-text">
  Don’t have an account? <a href="register.html">Sign Up</a>
</p>

</form>

</div>

</div>

</section>

<script>
function togglePass(){
const input = document.getElementById("password");
input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
